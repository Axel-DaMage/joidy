# Development overrides: hot reload, source mounts, verbose logging
services:
  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:${API_PORT:-8000}
      # For SvelteKit SSR running inside Docker, localhost:PORT doesn't exist.
      # This URL is used server-side only; the browser still uses VITE_API_URL.
      - VITE_INTERNAL_API_URL=http://api:8000
    command: npm run dev -- --host 0.0.0.0 --port 3000

  api:
    volumes:
      - ./api:/app
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    environment:
      - APP_ENV=development
      - WEB_CONCURRENCY=1
      - VAULT_PATH=/vault
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ai-service:
    volumes:
      - ./ai-service:/app
      - ./data/db:/data/db
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  worker:
    volumes:
      - ./worker:/app
      - ./data/db:/data/db
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    command: python main.py
