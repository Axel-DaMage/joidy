# Development overrides: hot reload, source mounts, verbose logging
services:
  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0 --port 3000

  api:
    volumes:
      - ./api:/app
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
    environment:
      - APP_ENV=development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ai-service:
    volumes:
      - ./ai-service:/app
      - ./data/db:/data/db
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  worker:
    volumes:
      - ./worker:/app
      - ./data/db:/data/db
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    command: python main.py
