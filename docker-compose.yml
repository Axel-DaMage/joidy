services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: joidy
      POSTGRES_PASSWORD: joidy
      POSTGRES_DB: joidy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joidy -d joidy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: d4mag3/joidy-api:latest
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
      - ./.env:/app/.env
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    environment:
      - DATABASE_URL=postgresql://joidy:joidy@postgres:5432/joidy
      - AI_SERVICE_URL=http://ai-service:8002
      - WORKER_URL=http://worker:8001
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ai-service:
    image: d4mag3/joidy-ai-service:latest
    ports:
      - "${AI_SERVICE_PORT:-8002}:8002"
    volumes:
      - ./data/db:/data/db
    environment:
      - DATABASE_URL=postgresql://joidy:joidy@postgres:5432/joidy
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: d4mag3/joidy-worker:latest
    volumes:
      - ./data/db:/data/db
      - ./.env:/app/.env
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault
    environment:
      - DATABASE_URL=postgresql://joidy:joidy@postgres:5432/joidy
      - API_URL=http://api:8000
      - AI_SERVICE_URL=http://ai-service:8002
      - VAULT_PATH=/vault
      - APP_ENV=${APP_ENV:-production}
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: d4mag3/joidy-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
