name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  docker:
    name: Docker Hub
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend, ai-service, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/joidy-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew:
    name: Homebrew
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.version != ''
    steps:
      - uses: actions/checkout@v4
      - name: Update homebrew-tap formula
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          SHA=$(curl -sL "https://github.com/Axel-DaMage/joidy/archive/refs/tags/${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Axel-DaMage/homebrew-tap.git
          cd homebrew-tap
          sed -i "s|url \".*\"|url \"https://github.com/Axel-DaMage/joidy/archive/refs/tags/${VERSION}.tar.gz\"|" Formula/joidy.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/joidy.rb
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/joidy.rb
          git commit -m "joidy ${VERSION}"
          git push

  aur:
    name: AUR
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.version != ''
    steps:
      - name: Update AUR PKGBUILD
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION_CLEAN="${VERSION#v}"
          VERSION_PKGBUILD="$(echo "${VERSION_CLEAN}" | sed 's/-/_/g')"
          SHA=$(curl -sL "https://github.com/Axel-DaMage/joidy/archive/refs/tags/${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/joidy.git
          cd joidy
          {
            echo '# Maintainer: Joidy App <https://github.com/Axel-DaMage/joidy>'
            echo "pkgname=joidy"
            echo "pkgver=${VERSION_PKGBUILD}"
            echo "_tag=${VERSION_CLEAN}"
            echo "pkgrel=1"
            echo 'pkgdesc="Personal knowledge management with gamification"'
            echo "arch=('any')"
            echo 'url="https://joidy-web.vercel.app"'
            echo "license=('GPL3')"
            echo "depends=('docker' 'docker-compose')"
            echo 'source=("https://github.com/Axel-DaMage/joidy/archive/v${_tag}.tar.gz")'
            echo "sha256sums=('${SHA}')"
            echo ""
            echo "package() {"
            echo '  cd "${srcdir}/joidy-${_tag}"'
            echo '  install -Dm755 bin/joidy "${pkgdir}/usr/bin/joidy"'
            echo '  install -Dm644 docker-compose.yml "${pkgdir}/usr/share/joidy/docker-compose.yml"'
            echo '  install -Dm644 .env.example "${pkgdir}/usr/share/joidy/.env.example"'
            echo "}"
          } > PKGBUILD
          {
            echo "pkgbase = joidy"
            echo "pkgdesc = Personal knowledge management with gamification"
            echo "pkgver = ${VERSION_PKGBUILD}"
            echo "pkgrel = 1"
            echo "url = https://joidy-web.vercel.app"
            echo "arch = any"
            echo "license = GPL3"
            echo "depends = docker"
            echo "depends = docker-compose"
            echo "source = https://github.com/Axel-DaMage/joidy/archive/v${VERSION}.tar.gz"
            echo "sha256sums = ${SHA}"
            echo "pkgname = joidy"
          } > .SRCINFO
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "update to ${VERSION}"
          git push --force origin master
